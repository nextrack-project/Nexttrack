<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexTTrack — Connexion DJ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#080808;--card:#141414;--border:rgba(255,255,255,0.07);--accent:#c8ff00;--accent2:#ff3cac;--text:#e8e8e8;--muted:#666;--input-bg:#1a1a1a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(ellipse,rgba(200,255,0,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .container{width:100%;max-width:420px;position:relative;z-index:1;}
  header{text-align:center;margin-bottom:40px;}
  .app-name{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.35em;color:var(--accent);display:block;margin-bottom:10px;}
  .app-name .t{color:rgba(200,255,0,0.4);}
  h1{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:0.9;color:#fff;}
  .tagline{font-size:13px;color:var(--muted);margin-top:10px;}
  .tabs{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;}
  .tab-btn{background:none;border:none;padding:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:9px;transition:all 0.2s;}
  .tab-btn.active{background:var(--accent);color:#000;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;}
  .field{margin-bottom:16px;}
  label{display:block;font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
  input:focus{border-color:rgba(200,255,0,0.4);box-shadow:0 0 0 3px rgba(200,255,0,0.06);}
  input::placeholder{color:#3a3a3a;}
  .submit-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:12px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.15em;cursor:pointer;transition:transform 0.15s;margin-top:8px;}
  .submit-btn:hover{transform:translateY(-2px);}
  .submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .plan-info{background:rgba(200,255,0,0.05);border:1px solid rgba(200,255,0,0.15);border-radius:10px;padding:14px;margin-bottom:20px;}
  .plan-info p{font-size:12px;color:var(--accent);line-height:1.6;}
  .msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-top:12px;display:none;}
  .msg.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:#ff6b6b;}
  .msg.success{background:rgba(200,255,0,0.07);border:1px solid rgba(200,255,0,0.2);color:var(--accent);}
  .msg.visible{display:block;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  footer{text-align:center;margin-top:24px;font-size:11px;color:#2a2a2a;}
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="app-name">NexT<span class="t">Track</span></span>
    <h1>DJ<br>PORTAL</h1>
    <p class="tagline">Gère tes demandes en live</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tabLogin">Connexion</button>
    <button class="tab-btn" id="tabSignup">Inscription</button>
  </div>

  <div class="card" id="loginCard">
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="ton@email.com" /></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••" /></div>
    <button class="submit-btn" id="loginBtn">CONNEXION</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <div class="card" id="signupCard" style="display:none;">
    <div class="plan-info"><p>🎛️ <strong>14 jours gratuits</strong> — aucune carte requise.<br>Ensuite 9,90€/mois ou 19,90 CHF/mois.</p></div>
    <div class="field"><label>Nom de DJ / établissement</label><input type="text" id="signupName" placeholder="Ex : Mike Deem" /></div>
    <div class="field"><label>Email</label><input type="email" id="signupEmail" placeholder="ton@email.com" /></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="signupPassword" placeholder="8 caractères minimum" /></div>
    <button class="submit-btn" id="signupBtn">CRÉER MON COMPTE</button>
    <div class="msg" id="signupMsg"></div>
  </div>

  <footer>NexTTrack · Réservé aux professionnels</footer>
</div>

<script src="/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://auotqmoflcjigqetxcfm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1b3RxbW9mbGNqaWdxZXR4Y2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NjUzMjEsImV4cCI6MjA5NzM0MTMyMX0.tYk78GudMkntmDTq6tv_AqiMCyXYOoBp9XyA7i-2ZCQ';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Tabs
  document.getElementById('tabLogin').addEventListener('click', () => {
    document.getElementById('loginCard').style.display = 'block';
    document.getElementById('signupCard').style.display = 'none';
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabSignup').classList.remove('active');
  });
  document.getElementById('tabSignup').addEventListener('click', () => {
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('signupCard').style.display = 'block';
    document.getElementById('tabSignup').classList.add('active');
    document.getElementById('tabLogin').classList.remove('active');
  });

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type + ' visible';
  }

  function slugify(text) {
    return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  }

  // LOGIN
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showMsg('loginMsg','Remplis tous les champs','error'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>CONNEXION...';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showMsg('loginMsg', 'Email ou mot de passe incorrect', 'error');
      btn.disabled = false; btn.textContent = 'CONNEXION';
    } else {
      window.location.href = 'nextrack-dashboard.html';
    }
  });

  // SIGNUP
  document.getElementById('signupBtn').addEventListener('click', async () => {
    const btn = document.getElementById('signupBtn');
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!name || !email || !password) { showMsg('signupMsg','Remplis tous les champs','error'); return; }
    if (password.length < 8) { showMsg('signupMsg','Mot de passe trop court (8 car. min)','error'); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>CRÉATION...';
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) {
      showMsg('signupMsg', error.message, 'error');
      btn.disabled = false; btn.textContent = 'CRÉER MON COMPTE'; return;
    }
    const slug = slugify(name) + '-' + Math.random().toString(36).substr(2,4);
    await sb.from('djs').insert({ id: data.user.id, email, name, slug, notification_email: email });
    showMsg('signupMsg', '✅ Compte créé ! Tu peux te connecter.', 'success');
    btn.disabled = false; btn.textContent = 'CRÉER MON COMPTE';
  });

  // Redirige si déjà connecté
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'nextrack-dashboard.html';
  });
</script>
</body>
</html>
